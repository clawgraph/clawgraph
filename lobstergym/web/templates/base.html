<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}LobsterGym{% endblock %}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, -apple-system, sans-serif; line-height: 1.6; color: #1a1a2e; background: #f8f9fa; }
    .navbar { background: #e63946; color: #fff; padding: 0.75rem 1.5rem; display: flex; align-items: center; gap: 1.5rem; }
    .navbar a { color: #fff; text-decoration: none; font-weight: 500; }
    .navbar a:hover { text-decoration: underline; }
    .navbar .brand { font-size: 1.25rem; font-weight: 700; }
    .container { max-width: 960px; margin: 2rem auto; padding: 0 1rem; }
    h1, h2, h3 { margin-bottom: 0.75rem; }
    .card { background: #fff; border-radius: 8px; box-shadow: 0 1px 3px rgba(0,0,0,.1); padding: 1.5rem; margin-bottom: 1rem; }
    .btn { display: inline-block; padding: 0.5rem 1rem; border: none; border-radius: 4px; cursor: pointer; font-size: 0.95rem; text-decoration: none; }
    .btn-primary { background: #e63946; color: #fff; }
    .btn-primary:hover { background: #c1121f; }
    .btn-secondary { background: #457b9d; color: #fff; }
    .btn-secondary:hover { background: #1d3557; }
    .btn-success { background: #2a9d8f; color: #fff; }
    .btn-success:hover { background: #1a7a6e; }
    .btn-danger { background: #d62828; color: #fff; }
    .btn-danger:hover { background: #9b2226; }
    .btn-sm { padding: 0.25rem 0.5rem; font-size: 0.85rem; }
    input, select, textarea { padding: 0.5rem; border: 1px solid #ccc; border-radius: 4px; font-size: 0.95rem; width: 100%; margin-bottom: 0.75rem; }
    label { display: block; font-weight: 600; margin-bottom: 0.25rem; }
    table { width: 100%; border-collapse: collapse; margin-bottom: 1rem; }
    th, td { padding: 0.5rem 0.75rem; text-align: left; border-bottom: 1px solid #dee2e6; }
    th { background: #f1f3f5; font-weight: 600; }
    .text-muted { color: #6c757d; }
    .text-success { color: #2a9d8f; }
    .text-danger { color: #e63946; }
    .badge { display: inline-block; padding: 0.15rem 0.5rem; border-radius: 12px; font-size: 0.8rem; font-weight: 600; }
    .badge-info { background: #a8dadc; color: #1d3557; }
    .badge-success { background: #d4edda; color: #155724; }
    .grid { display: grid; gap: 1rem; }
    .grid-2 { grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); }
    .grid-3 { grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); }
    .form-row { display: flex; gap: 1rem; }
    .form-row > * { flex: 1; }
    .mt-1 { margin-top: 0.5rem; } .mt-2 { margin-top: 1rem; } .mt-3 { margin-top: 1.5rem; }
    .mb-1 { margin-bottom: 0.5rem; } .mb-2 { margin-bottom: 1rem; }
    .emoji { font-size: 1.5rem; }
  </style>
</head>
<body>
  <nav class="navbar">
    <a href="/" class="brand">🦞 LobsterGym</a>
    <a href="/flights">Flights</a>
    <a href="/todos">Todos</a>
    <a href="/contact">Contact</a>
    <a href="/shop">Shop</a>
  </nav>
  <div class="container">
    {% block content %}{% endblock %}
  </div>
</body>
</html>
