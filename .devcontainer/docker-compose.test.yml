services:
  # ClawGraph unit tests (no API key needed)
  test-bed:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
    volumes:
      - ..:/workspace:cached
      - clawgraph-data:/root/.clawgraph
    working_dir: /workspace
    command: >
      bash -c "
        echo '=== ClawGraph Unit Tests ===' &&
        pip install -e '.[dev]' &&
        python -m pytest tests/ -v &&
        echo '=== All tests passed ==='
      "

  # ClawGraph CLI integration test (requires OPENAI_API_KEY)
  integration-test:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    volumes:
      - ..:/workspace:cached
    working_dir: /workspace
    command: >
      bash -c "
        echo '=== ClawGraph Integration Tests ===' &&
        pip install -e '.[dev]' &&
        clawgraph add 'Alice is an engineer at Acme Corp' &&
        clawgraph add 'Bob manages the design team at Acme' &&
        clawgraph query 'Who works at Acme?' --output json &&
        clawgraph export --output json &&
        clawgraph ontology &&
        echo '=== Integration tests complete ==='
      "

  # OpenClaw gateway with ClawGraph skill mounted
  openclaw-gateway:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
    ports:
      - "18789:18789"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN:-lobstergym-dev-token}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
    volumes:
      - ..:/workspace:cached
      - openclaw-home:/root/.openclaw
    working_dir: /workspace
    command: ["bash", "/workspace/.devcontainer/start-openclaw-gateway.sh"]

  # Send a message to the running OpenClaw agent and inspect the response
  # Usage: docker compose -f .devcontainer/docker-compose.test.yml run openclaw-test
  openclaw-test:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
    network_mode: "service:openclaw-gateway"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN:-lobstergym-dev-token}
    volumes:
      - ..:/workspace:cached
      - openclaw-home:/root/.openclaw
    working_dir: /workspace
    entrypoint: ["bash", "-c"]
    command:
      - |
        echo '=== OpenClaw + ClawGraph Agent Test ==='
        pip install -e '.[dev]'
        echo ''
        echo 'Step 1: Use an explicit ClawGraph storage control prompt'
        openclaw agent --to +15555550123 --thinking minimal --message "Use your ClawGraph memory skill to store exactly these facts: Alice works at Google. Alice is learning Rust. Alice is planning an agent-memory demo for later this week."
        echo ''
        echo 'Step 2: Inspect ClawGraph DB directly'
        clawgraph export --output json
        echo ''
        echo '=== Test complete ==='

volumes:
  clawgraph-data:
  openclaw-home:
