name: Dependency Security Audit

on:
  schedule:
    # Run daily at 08:00 UTC
    - cron: "0 8 * * *"
  push:
    paths:
      - "pyproject.toml"
      - "requirements.lock"
  pull_request:
    paths:
      - "pyproject.toml"
      - "requirements.lock"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install audit tools
        run: pip install pip-audit==2.10.0

      - name: Install project dependencies
        run: pip install .

      - name: pip-audit — check for known vulnerabilities
        run: pip-audit --strict --desc

      - name: Alert on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🚨 Dependency security alert — ${new Date().toISOString().split('T')[0]}`,
              body: `The daily dependency audit failed. Check the [workflow run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}) for details.\n\nThis may indicate:\n- A known CVE in a dependency\n- A compromised package\n- Hash mismatch (package binary changed upstream)`,
              labels: ['security', 'dependencies']
            });
